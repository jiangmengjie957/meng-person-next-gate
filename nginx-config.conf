server
{
    listen 80;
    listen 443 ssl http2;
    server_name www.mengmenga.com;
    index index.html index.htm;
    root /www/wwwroot/meng-person-next-gate/dist;  # 改为指向 dist 目录

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/www.mengmenga.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    ssl_certificate    /www/server/panel/vhost/cert/www.mengmenga.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/www.mengmenga.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    # kbk-management 项目
    location ^~ /kbk-management {
        alias /www/wwwroot/kbk-omni-view/dist;
        index index.html index.htm;
        try_files $uri $uri/ /kbk-management/index.html;
    }

    location ^~ /kbk-management/static/ {
        alias /www/wwwroot/kbk-omni-view/dist/static/;
        expires 1y;
    }

    # API 代理
    location ~ ^/api/v1 {
        proxy_pass http://127.0.0.1:4001;
    }

    # game 代理
    location ~ ^/game {
        proxy_pass http://127.0.0.1:3002;
    }

    # 新的 React 静态站点配置 - 替代原来的 proxy_pass
    location / {
        try_files $uri $uri/ /index.html;  # SPA 路由支持
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # 一键申请SSL证书验证目录相关设置
    location ~ \.well-known {
        allow all;
    }

    # 禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/www.mengmenga.com.log;
    error_log  /www/wwwlogs/www.mengmenga.com.error.log;
}
